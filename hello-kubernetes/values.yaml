# Default values for hello-kubernetes.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: dilipnigam007/hello-gitops-app
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "11"

service:
  type: LoadBalancer
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Custom configuration variables that hello-kubernetes app accepts as environment variables
config:
  message: "Hello from Dilip, Akanksha, and Advik! ❤️"
  uiColor: "#e74c3c" # Warm red

